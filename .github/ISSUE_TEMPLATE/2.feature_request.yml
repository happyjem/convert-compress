name: Feature request
description: Suggest an idea or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      placeholder: |
        Describe the feature.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is it useful?
      placeholder: |
        This would help because ...

  - type: textarea
    id: details
    attributes:
      label: Extra details
      description: Screenshots, examples, formats, or workflow notes.
